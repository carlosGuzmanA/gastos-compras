<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e38" />
      <stop offset="100%" stop-color="#0f0f1a" />
    </linearGradient>
    
    <!-- Wallet Gradient -->
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#3730a3" />
    </linearGradient>

    <!-- Accent/Glow Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Gold/Credit Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Inner border light -->
  <rect x="12" y="12" width="488" height="488" rx="116" fill="none" stroke="rgba(99, 102, 241, 0.15)" stroke-width="4" />

  <!-- Abstract decorative background glow -->
  <circle cx="400" cy="120" r="100" fill="#4f46e5" opacity="0.15" filter="url(#glow)" />
  <circle cx="120" cy="400" r="100" fill="#10b981" opacity="0.1" filter="url(#glow)" />

  <!-- Money / Bill sticking out of the wallet -->
  <rect x="180" y="110" width="180" height="100" rx="16" fill="url(#accentGrad)" transform="rotate(-10, 270, 160)" />
  <!-- Bill details -->
  <rect x="200" y="130" width="140" height="60" rx="8" fill="none" stroke="rgba(255, 255, 255, 0.3)" stroke-width="4" transform="rotate(-10, 270, 160)" />
  <circle cx="270" cy="160" r="18" fill="rgba(255, 255, 255, 0.2)" transform="rotate(-10, 270, 160)" />

  <!-- Credit Card / Fiado symbol sticking out -->
  <rect x="150" y="140" width="190" height="110" rx="16" fill="url(#goldGrad)" transform="rotate(8, 245, 195)" />
  <rect x="170" y="160" width="45" height="30" rx="6" fill="rgba(255, 255, 255, 0.35)" transform="rotate(8, 245, 195)" />
  <line x1="170" y1="210" x2="310" y2="210" stroke="rgba(255, 255, 255, 0.25)" stroke-width="6" stroke-linecap="round" transform="rotate(8, 245, 195)" />

  <!-- Main Wallet Body -->
  <rect x="112" y="192" width="288" height="208" rx="28" fill="url(#walletGrad)" filter="url(#glow)" />

  <!-- Wallet Seam Line (Stitching) -->
  <rect x="124" y="204" width="264" height="184" rx="20" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="4" stroke-dasharray="10 8" />

  <!-- Wallet Flap / Opener -->
  <path d="M 280,240 L 400,240 A 30,30 0 0,1 400,300 L 280,300 Z" fill="#3730a3" filter="url(#glow)" />
  <path d="M 284,244 L 396,244 A 26,26 0 0,1 396,296 L 284,296 Z" fill="url(#walletGrad)" />
  
  <!-- Flap Stitching -->
  <path d="M 280,252 L 388,252 A 18,18 0 0,1 388,288 L 280,288" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="3" stroke-dasharray="8 6" />

  <!-- Wallet Clasp (Gold Button) -->
  <circle cx="360" cy="270" r="18" fill="url(#goldGrad)" filter="url(#glow)" />
  <circle cx="360" cy="270" r="8" fill="#fff" opacity="0.3" />
</svg>
